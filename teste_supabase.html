<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teste Supabase</title>
<style>body{font-family:sans-serif;padding:20px;background:#111;color:#fff}
.ok{color:#00E5A0}.err{color:#FF4D6A}.info{color:#4A9DFF}
pre{background:#222;padding:10px;border-radius:8px;font-size:.75rem;word-break:break-all;white-space:pre-wrap}
button{background:#4A9DFF;border:none;color:#fff;padding:10px 20px;border-radius:8px;font-size:1rem;margin:5px;cursor:pointer}
</style>
</head>
<body>
<h2>🔧 Diagnóstico AquaGestor</h2>
<button onclick="testar()">▶ Rodar Teste</button>
<button onclick="limpar()">🗑 Limpar Cache</button>
<div id="out"></div>
<script>
const URL = 'https://hzywzynmhaeuaczcgmdr.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6eXd6eW5taGFldWFjemNnbWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzAwMTksImV4cCI6MjA5NTE0NjAxOX0.Ru9PNf_RkISb3pdGw2tuerDj0sElk0R1GiAHdI10SwQ';
const EMAIL = 'jefersonpabloc@gmail.com';
const SENHA = 'apstilapia2008';
const ADMIN_ID = 'b0efb494-3626-4dc5-86b9-d7db8412db1b';

function log(msg, cls) {
  document.getElementById('out').innerHTML += '<p class="'+(cls||'')+'">'+msg+'</p>';
}
function logPre(obj) {
  document.getElementById('out').innerHTML += '<pre>'+JSON.stringify(obj,null,2)+'</pre>';
}

function limpar() {
  localStorage.clear();
  log('✅ localStorage limpo — recarregue a página', 'ok');
}

async function testar() {
  document.getElementById('out').innerHTML = '';
  
  // 1. Teste de rede
  log('1️⃣ Testando conexão com Supabase...', 'info');
  try {
    var r = await fetch(URL+'/auth/v1/settings', {headers:{'apikey':KEY}});
    log('Conexão: HTTP '+r.status + (r.ok?' ✅':' ⚠️'), r.ok?'ok':'err');
    var d = await r.json().catch(()=>({}));
    logPre({status:r.status, site_url: d.external||'n/a'});
  } catch(e) {
    log('❌ Sem conexão: '+e.message, 'err');
    return;
  }

  // 2. Login
  log('2️⃣ Fazendo login...', 'info');
  try {
    var lr = await fetch(URL+'/auth/v1/token?grant_type=password', {
      method:'POST',
      headers:{'apikey':KEY,'Content-Type':'application/json'},
      body: JSON.stringify({email:EMAIL, password:SENHA})
    });
    var ld = await lr.json();
    if (lr.ok && ld.access_token) {
      log('✅ Login OK! user_id: '+ld.user.id, 'ok');
      localStorage.setItem('aq_session', JSON.stringify(ld));
      localStorage.setItem('aq_config', JSON.stringify({
        url:URL, key:KEY, adminId:ld.user.id,
        adminEmail:EMAIL, adminPassword:SENHA, adminNome:'Jeferson Pablo'
      }));
      log('✅ Sessão e config salvos no localStorage', 'ok');
      
      // 3. Buscar dados
      log('3️⃣ Buscando dados do Supabase...', 'info');
      var dr = await fetch(URL+'/rest/v1/user_data?user_id=eq.'+ld.user.id+'&select=full_key&order=full_key', {
        headers:{'apikey':KEY,'Authorization':'Bearer '+ld.access_token}
      });
      var dd = await dr.json();
      if (dr.ok) {
        log('✅ '+dd.length+' chaves encontradas no banco:', 'ok');
        logPre(dd.map(function(x){return x.full_key;}));
        
        // 4. Gravar dados no localStorage
        log('4️⃣ Gravando dados no localStorage...', 'info');
        var allR = await fetch(URL+'/rest/v1/user_data?user_id=eq.'+ld.user.id+'&select=full_key,data_value', {
          headers:{'apikey':KEY,'Authorization':'Bearer '+ld.access_token}
        });
        var allD = await allR.json();
        allD.forEach(function(row) {
          localStorage.setItem(row.full_key, JSON.stringify(row.data_value));
        });
        log('✅ '+allD.length+' itens salvos no localStorage!', 'ok');
        log('🎉 TUDO OK! Abra o aquagestor_final.html agora.', 'ok');
      } else {
        log('❌ Erro ao buscar dados: '+JSON.stringify(dd), 'err');
      }
    } else {
      log('❌ Login falhou: '+(ld.error_description||ld.message||JSON.stringify(ld)), 'err');
    }
  } catch(e) {
    log('❌ Erro: '+e.message, 'err');
  }
}
</script>
</body>
</html>
